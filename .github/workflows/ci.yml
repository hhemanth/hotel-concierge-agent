name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pyright + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright pytest

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type-check (pyright)
        run: pyright app/
        env:
          # Pyright doesn't need real keys to type-check
          ANTHROPIC_API_KEY: dummy
          VOYAGE_API_KEY: dummy
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy

      - name: Tests (pytest)
        run: pytest tests/ -x -q --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
