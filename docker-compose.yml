services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: concierge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concierge}
      POSTGRES_DB: ${POSTGRES_DB:-concierge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concierge}"]
      interval: 5s
      timeout: 5s
      retries: 5
